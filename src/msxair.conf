# Configuracao base do projeto MSX Air
# Ajuste os valores conforme seu ambiente.

# Diretorio onde o usuario vai guardar ROM/DSK e outros arquivos de midia.
MEDIA_DIR="${HOME}/roms/msx"

# Maquina padrao Turbo-R no openMSX.
MACHINE="Panasonic_FS-A1GT"

# Extensoes solicitadas no projeto.
# Dica: valide a disponibilidade local com: openmsx -ext list
EXTENSIONS=(
  "ide"
)

# Midias opcionais para carregamento automatico.
AUTOSTART_ROM=""
AUTOSTART_DSK=""

# Comando opcional para preparar conexao de rede no host antes de iniciar o emulador.
# Exemplo: WIFI_PRE_START_CMD="nmcli connection up 'Minha WiFi'"
WIFI_PRE_START_CMD=""
